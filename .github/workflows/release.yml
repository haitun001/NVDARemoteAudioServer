name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add clippy rustfmt

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

  build:
    name: Build ${{ matrix.name }}
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: NVDARemoteAudioServer-linux-amd64.tar.gz
          - name: windows-amd64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: NVDARemoteAudioServer-windows-amd64.zip
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: rust-lld

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build server
        run: cargo build --release --target ${{ matrix.target }} --bin NVDARemoteAudioServer

      - name: Build load test
        run: cargo build --release --target ${{ matrix.target }} --bin NVDARemoteAudioServer_load_test

      - name: Package Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p package
          cp target/${{ matrix.target }}/release/NVDARemoteAudioServer package/
          cp target/${{ matrix.target }}/release/NVDARemoteAudioServer_load_test package/
          cp README.md README-ZHCN.md LICENSE package/
          mkdir -p package/deploy/systemd
          cp deploy/systemd/NVDARemoteAudioServer.service package/deploy/systemd/
          tar -czf ${{ matrix.archive }} -C package .

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package | Out-Null
          Copy-Item target\${{ matrix.target }}\release\NVDARemoteAudioServer.exe package\
          Copy-Item target\${{ matrix.target }}\release\NVDARemoteAudioServer_load_test.exe package\
          Copy-Item README.md, README-ZHCN.md, LICENSE package\
          New-Item -ItemType Directory -Force package\deploy\systemd | Out-Null
          Copy-Item deploy\systemd\NVDARemoteAudioServer.service package\deploy\systemd\
          Compress-Archive -Path package\* -DestinationPath ${{ matrix.archive }} -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          COMMIT_SUBJECT="$(git log -1 --pretty=%s)"
          {
            echo "NVDARemoteAudioServer $TAG_NAME"
            echo
            echo "Changes:"
            echo "- $COMMIT_SUBJECT"
          } > release-notes.md

          gh release create "$TAG_NAME" artifacts/**/* \
            --repo "$REPOSITORY" \
            --title "NVDARemoteAudioServer $TAG_NAME" \
            --notes-file release-notes.md
